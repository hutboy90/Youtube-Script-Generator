<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Subtitle Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="4" fill="#FF0000"/>
          <polygon points="10,7 17,12 10,17" fill="white"/>
        </svg>
        <h1>YT Subtitle Downloader</h1>
      </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="current">Current Video</button>
      <button class="tab" data-tab="batch">Batch Download</button>
    </div>

    <!-- Tab: Current Video (Phase 1) -->
    <div class="tab-content active" id="tab-current">
      <!-- Loading state -->
      <div class="state" id="state-loading">
        <div class="spinner"></div>
        <p>Detecting video...</p>
      </div>

      <!-- Error state -->
      <div class="state hidden" id="state-error">
        <div class="error-icon">!</div>
        <p id="error-message">Not on a YouTube video page</p>
      </div>

      <!-- No subtitles state -->
      <div class="state hidden" id="state-no-subs">
        <div class="warning-icon">CC</div>
        <p class="video-title-small" id="no-subs-title"></p>
        <p>No subtitles available for this video</p>
      </div>

      <!-- Ready state -->
      <div class="state hidden" id="state-ready">
        <div class="video-info">
          <p class="video-title" id="video-title"></p>
          <p class="video-status" id="track-count"></p>
        </div>

        <div class="form-group">
          <label for="language-select">Language</label>
          <select id="language-select"></select>
        </div>

        <div class="form-group">
          <label>Format</label>
          <div class="format-buttons">
            <button class="format-btn active" data-format="txt">TXT</button>
            <button class="format-btn" data-format="srt">SRT</button>
            <button class="format-btn" data-format="vtt">VTT</button>
          </div>
        </div>

        <button class="download-btn" id="download-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download Subtitle
        </button>

        <!-- Download status -->
        <div class="download-status hidden" id="download-status">
          <span class="status-icon" id="status-icon"></span>
          <span id="status-text"></span>
        </div>
      </div>
    </div>

    <!-- Tab: Batch Download (Phase 2) -->
    <div class="tab-content" id="tab-batch">
      <!-- Add URL input -->
      <div class="batch-add">
        <input type="text" id="batch-url-input" placeholder="Paste YouTube URL here..." />
        <button id="batch-add-btn" title="Add URL">+</button>
      </div>

      <!-- Video list -->
      <div class="batch-list" id="batch-list">
        <!-- Items will be added dynamically -->
      </div>
      <div class="batch-empty hidden" id="batch-empty">
        <p>No videos added yet. Paste a YouTube URL above or open a YouTube video page.</p>
      </div>

      <!-- Settings -->
      <div class="batch-settings" id="batch-settings">
        <div class="form-group">
          <label for="batch-folder-name">Folder Name</label>
          <input type="text" id="batch-folder-name" placeholder="YT Subtitles" value="YT Subtitles" />
        </div>

        <div class="form-group">
          <label>Format</label>
          <div class="format-buttons">
            <button class="batch-format-btn active" data-format="txt">TXT</button>
            <button class="batch-format-btn" data-format="srt">SRT</button>
            <button class="batch-format-btn" data-format="vtt">VTT</button>
          </div>
        </div>

        <button class="download-btn" id="batch-download-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download All (<span id="batch-count">0</span>)
        </button>

        <!-- Batch progress -->
        <div class="batch-progress hidden" id="batch-progress">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="progress-text" id="progress-text">Processing...</p>
        </div>

        <!-- Batch status -->
        <div class="download-status hidden" id="batch-status">
          <span class="status-icon" id="batch-status-icon"></span>
          <span id="batch-status-text"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
